<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judith's website</title>
</head>
<body>
    
    <form action="/signup" autocomplete="on">
        <fieldset>
          <legend>Create account</legend>
      
          <div>
            <label for="name">Full name</label>
            <input id="name" name="name" type="text" placeholder="Jane Doe" required minlength="2" />
          </div>
      
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </div>
      
          <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password" />
          </div>
      
          <div>
            <span>Plan</span>
            <label><input name="plan" type="radio" value="basic" required /> Basic</label>
            <label><input name="plan" type="radio" value="pro" /> Pro</label>
          </div>
      
          <div>
            <label for="country">Country</label>
            <select id="country" name="country" required>
              <option value="">Select...</option>
              <optgroup label="North America">
                <option value="us">United States</option>
                <option value="ca">Canada</option>
              </optgroup>
            </select>
          </div>
      
          <div>
            <label for="avatar">Profile photo</label>
            <input id="avatar" name="avatar" type="file" accept="image/*" />
          </div>
      
          <div>
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4" maxlength="200" placeholder="Tell us about yourself"></textarea>
          </div>
      
          <div>
            <label for="city">City (with suggestions)</label>
            <input id="city" name="city" list="city-options" />
            <datalist id="city-options">
              <option value="New York"></option>
              <option value="Toronto"></option>
              <option value="London"></option>
            </datalist>
          </div>
      
          <div>
            <button type="submit">Sign up</button>
            <button type="reset">Reset</button>
          </div>
        </fieldset>
      </form>
</body>
</html>
