<!-- CSS Positioning -->
<!-- | Position Type | Description                                                    | Example Use                                |
| ------------- | -------------------------------------------------------------- | ------------------------------------------ |
| `static`      | Default â€” follows normal page flow.                            | Normal document layout.                    |
| `relative`    | Moves element **relative to its normal position**.             | Small adjustments without breaking layout. |
| `absolute`    | Moves element **relative to the nearest positioned ancestor**. | Tooltips, popups.                          |
| `fixed`       | Stays in one spot **relative to the viewport**.                | Sticky navbar, back-to-top button.         |
| `sticky`      | Behaves like relative until a scroll point, then sticks.       | Sticky headers or sidebars.                | -->
